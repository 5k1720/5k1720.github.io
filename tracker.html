<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Трекер</title>
<link rel="stylesheet" href="style.css">
<style>
  .tracker-wrapper {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    width: 100%; max-width: 600px; padding: 2.5rem; border-radius: 24px;
    background-color: var(--button-bg); border: 1px solid var(--button-border);
    box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin: 0 auto;
  }
  .tracker-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 1rem; text-align: center; }
  .tracker-days { font-size: 3rem; font-weight: 700; margin-bottom: 2rem; }
  .tracker-bar-container {
    width: 100%; height: 20px; background-color: var(--page-bg);
    border-radius: 10px; overflow: hidden; border: 1px solid var(--button-border); position: relative;
  }
  .tracker-bar {
    height: 100%; width: 0%; background: linear-gradient(90deg, #ff00cc, #3333ff, #00ffcc);
    background-size: 200% 200%; animation: bar-glow 3s ease infinite; transition: width 1s ease-in-out;
  }
  @keyframes bar-glow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
  .tracker-labels { display: flex; justify-content: space-between; width: 100%; margin-top: 0.5rem; font-size: 0.8rem; opacity: 0.7; }
  .tracker-marks { display: flex; justify-content: center; gap: 8px; margin-top: 1.5rem; width: 100%; }
  .tracker-mark { width: 8px; height: 8px; border-radius: 50%; background-color: #2ecc71; opacity: 0.6; box-shadow: 0 0 6px rgba(46, 204, 113, 0.5); }
</style>
</head>
<body class="page-main">
<header class="site-header">
    <div class="logo">
        <a href="index.html">[ ψ ]</a>
    </div>
    <nav>
        <a href="index.html">главная</a>
        <a href="prompts.html" class="liquid">промты</a>
        <a href="tracker.html" class="active">трекер</a>
        <a href="me.html">обо мне</a>
    </nav>
</header>
<style>
  .trackers-container {
    display: flex; flex-direction: column; gap: 2rem; width: 100%; max-width: 600px; margin: 0 auto;
  }
</style>
<main class="main-content main-content-padded">
    <div class="trackers-container">
        <div class="tracker-wrapper">
            <h2 class="tracker-title">Без шмали</h2>
            <div class="tracker-days liquid" id="days-count">0 дней</div>
            <div class="tracker-bar-container">
                <div class="tracker-bar" id="progress-bar"></div>
            </div>
            <div class="tracker-labels">
                <span>Старт: 20.03.2026</span>
                <span id="next-goal">Цель: 3 года</span>
            </div>
            </div>

        <div class="tracker-wrapper">
            <h2 class="tracker-title">Без сигарет</h2>
            <div class="tracker-days liquid" id="days-count-smoke">0 дней</div>
            <div class="tracker-bar-container">
                <div class="tracker-bar" id="progress-bar-smoke"></div>
            </div>
            <div class="tracker-labels">
                <span>Старт: 15.06.2026</span>
                <span id="next-goal-smoke">Цель: 1 год</span>
            </div>
        </div>
    </div>
</main>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        function getDeclension(number, words) {
            const cases = [2, 0, 1, 1, 1, 2];
            return words[(number % 100 > 4 && number % 100 < 20) ? 2 : cases[(number % 10 < 5) ? number % 10 : 5]];
        }
        const daysWords = ['день', 'дня', 'дней'];

        // Трекер — без шмали
        const startDate = new Date("2026-03-20T00:00:00");
        const now = new Date();
        const diffDays = Math.floor(Math.abs(now - startDate) / (1000 * 60 * 60 * 24)) + 1;
        document.getElementById("days-count").textContent = diffDays + " " + getDeclension(diffDays, daysWords);
        const goal = 1095;
        setTimeout(() => {
            document.getElementById("progress-bar").style.width = Math.min((diffDays / goal) * 100, 100) + "%";
        }, 100);

        // Трекер — без сигарет
        const smokeStart = new Date("2026-06-15T00:00:00");
        const smokeDays = Math.floor(Math.abs(now - smokeStart) / (1000 * 60 * 60 * 24)) + 1;
        document.getElementById("days-count-smoke").textContent = smokeDays + " " + getDeclension(smokeDays, daysWords);
        const smokeGoal = 365;
        setTimeout(() => {
            document.getElementById("progress-bar-smoke").style.width = Math.min((smokeDays / smokeGoal) * 100, 100) + "%";
        }, 100);
    });
</script>
</body>
</html>
